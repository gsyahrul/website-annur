services:
  db:
    image: mysql:8.0
    container_name: ppdb_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password_ppdb
      MYSQL_DATABASE: ppdb_annur
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ppdb_network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-proot_password_ppdb",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build: .
    container_name: ppdb_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root_password_ppdb
      DB_NAME: ppdb_annur
      JWT_SECRET: super_secret_jwt_key_ppdb_annur_2024
      JWT_EXPIRES_IN: 7d
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ppdb_network

volumes:
  mysql_data:

networks:
  ppdb_network:
    driver: bridge
